<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VLL Pro — Vikas Enterprise Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --tally-blue: #0f2347; 
            --gold: #e8a020; 
            --cream: #f5f2e8; 
            --glass: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background: var(--tally-blue); 
            background-image: radial-gradient(circle at center, #1a3a63 0%, #050a14 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        .container { 
            text-align: center; 
            border: 1px solid var(--gold); 
            padding: 40px 30px; 
            background: rgba(10, 25, 49, 0.8); 
            backdrop-filter: blur(10px);
            border-radius: 4px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            width: 95%; 
            max-width: 450px; 
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid var(--gold);
            opacity: 0.3;
            pointer-events: none;
        }

        h1 { 
            font-family: 'Orbitron'; 
            color: var(--gold); 
            margin: 0; 
            font-size: 28px;
            letter-spacing: 3px;
        }

        .version { 
            font-family: 'Share Tech Mono'; 
            font-size: 11px; 
            opacity: 0.6; 
            margin-bottom: 35px; 
            letter-spacing: 1px;
        }

        .menu-grid { 
            display: grid; 
            gap: 15px; 
        }

        .menu-item { 
            display: flex;
            align-items: center;
            background: var(--cream); 
            color: var(--tally-blue); 
            padding: 18px; 
            text-decoration: none; 
            border-radius: 2px; 
            font-weight: bold; 
            border-left: 5px solid var(--gold); 
            transition: all 0.2s ease;
            text-align: left; 
        }

        .menu-item:hover { 
            transform: translateX(8px); 
            background: var(--gold); 
            color: white; 
        }

        .icon {
            font-size: 24px;
            margin-right: 15px;
            min-width: 35px;
            text-align: center;
        }

        .label-wrap { display: flex; flex-direction: column; }
        
        .main-label { font-size: 14px; text-transform: uppercase; }
        
        .sub-label { 
            font-size: 10px; 
            font-weight: normal; 
            margin-top: 3px; 
            opacity: 0.8; 
            font-family: 'Share Tech Mono';
        }

        .status-bar { 
            margin-top: 35px; 
            font-size: 9px; 
            font-family: 'Share Tech Mono'; 
            color: var(--gold);
            border-top: 1px solid rgba(232, 160, 32, 0.2); 
            padding-top: 20px; 
            text-transform: uppercase;
        }

        /* Responsive Mobile Tweak */
        @media (max-height: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 20px; }
            .version { margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>VLL PRO</h1>
    <div class="version">VIKAS ENTERPRISE ACCOUNTING SUITE v6.4</div>

    <div class="menu-grid">
        <a href="Cashbook.html" class="menu-item">
            <div class="icon">📖</div>
            <div class="label-wrap">
                <span class="main-label">Daily Cashbook</span>
                <span class="sub-label">Rozmel & Mode Reconciliation</span>
            </div>
        </a>

        <a href="Legder.html" class="menu-item">
            <div class="icon">👤</div>
            <div class="label-wrap">
                <span class="main-label">Party Legder</span>
                <span class="sub-label">Customer Khata & Universal Sync</span>
            </div>
        </a>

        <a href="Bridge.html" class="menu-item">
            <div class="icon">⚡</div>
            <div class="label-wrap">
                <span class="main-label">Tally Bridge</span>
                <span class="sub-label">Atomic Excel/CSV Data Injection</span>
            </div>
        </a>
    </div>

    <div class="status-bar">
        DB_STATE: ENCRYPTED // HASH_PROTO: SHA-256 // OFFLINE_BOOT: SUCCESS
    </div>
</div>

</body>
</html>
